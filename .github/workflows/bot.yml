name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  # schedule trigger removed: running on a cron alongside a Codespaces
  # instance causes two processes polling the same BOT_TOKEN's getUpdates
  # at once, which Telegram rejects with a conflict error. Use
  # workflow_dispatch (manual "Run workflow" button) if you need Actions
  # to run it on demand instead.

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          # skia-python (used by MangaTranslator for text rendering) needs a full
          # graphics/EGL stack even on a headless runner - libgl1 alone is not enough.
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip ffmpeg

      - name: Clone & Setup MangaTranslator Core
        run: |
          rm -rf MangaTranslator
          # Using our own fork with Manual Translation Mode support, instead of
          # upstream meangrinch/MangaTranslator - main.py/core/pipeline.py/
          # core/services/translation.py here carry the manual-mode changes
          # bot.py depends on (--manual-ocr-checkpoint, --manual-render-checkpoint,
          # --manual-translations-json flags, checkpoint save/load, OCR-only batch).
          git clone --branch main --depth 1 https://github.com/mudassirsenpai-art/Manual-auto-MangaTranslator.git MangaTranslator
          cd MangaTranslator
          # PyTorch must be installed explicitly - it is NOT in requirements.txt
          # because it's hardware-specific (CPU/CUDA/ROCm/MPS).
          pip install torch==2.11.0 torchvision==0.26.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          # Pillow: image stitching / tiling / PDF packaging
          # numpy: row-flatness analysis for safe-cut Manhwa tiling
          # PyMuPDF: pure-Python PDF page extraction (replaces pdftoppm)
          # openai, pyrogram, tgcrypto: bot runtime deps
          pip install Pillow numpy openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          python -c "import fitz; import PIL; import numpy; import pyrogram; import tgcrypto; print('core imports OK')"

      - name: Pre-download Local OCR Models
        timeout-minutes: 20
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Manual Translation Mode's local OCR options (manga-ocr / paddleocr-vl-1.6)
          # download their weights from HF Hub on first use inside the bot's own
          # (effectively infinite) polling process. If that download stalls or is
          # slow, it looks exactly like the bot "hanging" at 40% with no visible
          # progress or way to tell download-in-progress from a genuine freeze.
          #
          # Downloading here instead, as its own step with an explicit timeout,
          # means: (a) progress/errors show up in this step's own log instead of
          # being buried in the bot's live log, and (b) if HF is slow/unreachable
          # the workflow fails fast here with a clear timeout instead of the bot
          # process just sitting at some OCR percentage forever.
          #
          # local_dir targets below match core/ml/model_manager.py's own
          # model_paths (./models/manga-ocr-base and ./models/paddleocr-vl-1.6)
          # exactly, so the bot's _ensure_hf_repo() sees the weights already
          # present and skips re-downloading them at runtime.
          cd MangaTranslator
          pip install "huggingface_hub[cli]"
          python -c "
          from huggingface_hub import snapshot_download

          targets = [
              ('kha-white/manga-ocr-base', './models/manga-ocr-base'),
              ('PaddlePaddle/PaddleOCR-VL-1.6', './models/paddleocr-vl-1.6'),
          ]
          for repo_id, local_dir in targets:
              print(f'Pre-downloading {repo_id} -> {local_dir} ...', flush=True)
              snapshot_download(repo_id=repo_id, local_dir=local_dir)
              print(f'{repo_id} ready.', flush=True)
          "

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
          # Needed for OSB (Outside Speech Bubble) model download from HF Hub.
          # Without this, the download is unauthenticated and can hit HF's
          # anonymous rate limit on GitHub's shared runner IPs, which is what
          # was surfacing as the earlier "unauthenticated requests" warning.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python bot.py
