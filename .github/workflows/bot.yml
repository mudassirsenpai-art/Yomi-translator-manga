name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          # skia-python (used for text rendering) needs a full
          # graphics/EGL stack even on a headless runner - libgl1 alone is not enough.
          # --no-install-recommends avoids pulling in hundreds of extra packages.
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip

          # ffmpeg is split out and installed without recommends too -
          # otherwise it drags in the full mesa/va-driver/codec stack (200+ packages).
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Setup Python Environment & Dependencies
        run: |
          # PyTorch must be installed explicitly
          pip install torch==2.1.0 torchvision==0.16.0 --extra-index-url https://download.pytorch.org/whl/cpu

          # Install requirements if the file exists in your repository
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          # Install bot runtime dependencies
          pip install Pillow numpy openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          python -c "import fitz; import PIL; import numpy; import pyrogram; import tgcrypto; print('core imports OK')"

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
          # Needed for OSB (Outside Speech Bubble) model download from HF Hub.
          # Without this, the download is unauthenticated and can hit HF's
          # anonymous rate limit on GitHub's shared runner IPs.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python bot.py
