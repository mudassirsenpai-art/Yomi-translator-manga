name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 unzip zip ffmpeg poppler-utils

      - name: Clone & Setup MangaTranslator Core
        run: |
          rm -rf MangaTranslator
          git clone https://github.com/meangrinch/MangaTranslator.git
          cd MangaTranslator
          # PyTorch must be installed explicitly - it is NOT in requirements.txt
          # because it's hardware-specific (CPU/CUDA/ROCm/MPS). Without this,
          # `import torch` inside main.py crashes immediately with
          # ModuleNotFoundError, which silently kills every translation job.
          pip install torch==2.11.0 torchvision==0.26.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install Pillow openai pyrogram tgcrypto

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
        run: python bot.py
