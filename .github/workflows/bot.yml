name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          # skia-python (used by MangaTranslator for text rendering) needs a full
          # graphics/EGL stack even on a headless runner - libgl1 alone is not enough.
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip ffmpeg

      - name: Clone & Setup MangaTranslator Core
        env:
          DEPENDENCY_TOKEN: ${{ secrets.DEPENDENCY_TOKEN }}
        run: |
          rm -rf MangaTranslator
          # Authenticating the private repo clone using your token
          git clone https://x-access-token:${DEPENDENCY_TOKEN}@github.com/mudassirsenpai-art/MangaTranslator.git
          cd MangaTranslator
          # PyTorch must be installed explicitly - it is NOT in requirements.txt
          # Fixed the invalid version numbers (2.11.0 -> 2.1.0 and 0.26.0 -> 0.16.0)
          pip install torch==2.1.0 torchvision==0.16.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          # Pillow: image stitching / tiling / PDF packaging
          # numpy: row-flatness analysis for safe-cut Manhwa tiling
          # PyMuPDF: pure-Python PDF page extraction (replaces pdftoppm)
          # openai, pyrogram, tgcrypto: bot runtime deps
          pip install Pillow numpy openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          python -c "import fitz; import PIL; import numpy; import pyrogram; import tgcrypto; print('core imports OK')"

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
          # Needed for OSB (Outside Speech Bubble) model download from HF Hub.
          # Without this, the download is unauthenticated and can hit HF's
          # anonymous rate limit on GitHub's shared runner IPs.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python bot.py
