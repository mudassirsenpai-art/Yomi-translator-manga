name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip ffmpeg

      - name: Clone & Setup MangaTranslator Core
        run: |
          rm -rf MangaTranslator
          git clone https://github.com/meangrinch/MangaTranslator.git
          cd MangaTranslator
          pip install torch==2.11.0 torchvision==0.26.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install Pillow numpy openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          python -c "import fitz; import PIL; import numpy; import pyrogram; import tgcrypto; print('core imports OK')"

      # ---- DIAGNOSTIC STEP (temporary), round 2 ----
      # Round 1 confirmed: no core/detection.py in this version (logic moved
      # into pipeline.py + scaling.py), and no direct --imgsz/detection-size
      # flag exists. This round pulls the actual resize/scaling code so we
      # can see exactly how/where YOLO's input resolution is determined,
      # and whether it can be safely raised for tall Manhwa pages.
      - name: Diagnose YOLO detection resolution options (round 2)
        run: |
          echo "===== core/scaling.py (full file) ====="
          cat MangaTranslator/core/scaling.py || true
          echo ""
          echo "===== core/pipeline.py: lines mentioning resize/imgsz/detect/scale ====="
          grep -n -i "imgsz\|resize\|detect_speech\|scale\|max_side\|min_side\|yolo(" MangaTranslator/core/pipeline.py || true

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
        run: python bot.py
