name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip ffmpeg

      - name: Clone & Setup MangaTranslator Core
        run: |
          rm -rf MangaTranslator
          git clone https://github.com/meangrinch/MangaTranslator.git
          cd MangaTranslator
          pip install torch==2.11.0 torchvision==0.26.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install Pillow numpy openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          python -c "import fitz; import PIL; import numpy; import pyrogram; import tgcrypto; print('core imports OK')"

      # ---- DIAGNOSTIC STEP (temporary), round 3 ----
      # Round 2 confirmed the real detector lives at core/image/detection.py
      # (imported as `from .image.detection import detect_panels,
      # detect_speech_bubbles` in pipeline.py). scaling.py was just generic
      # math helpers, not the detector itself. This round pulls the real file.
      - name: Diagnose YOLO detection resolution options (round 3)
        run: |
          echo "===== core/image/detection.py (full file) ====="
          cat MangaTranslator/core/image/detection.py || true
          echo ""
          echo "===== core/image/ directory listing ====="
          ls -la MangaTranslator/core/image/ || true
          echo ""
          echo "===== core/config.py: lines mentioning bubble/context/max_side/min_side ====="
          grep -n -i "bubble_min_side\|context_image_max_side\|max_side\|min_side\|imgsz" MangaTranslator/core/config.py || true

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
        run: python bot.py
