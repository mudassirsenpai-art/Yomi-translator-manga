name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          # skia-python (used by MangaTranslator for text rendering) needs a full
          # graphics/EGL stack even on a headless runner - libgl1 alone is not enough.
          # NOTE: poppler-utils/pdftoppm has been removed - PDF extraction now uses
          # PyMuPDF (pure Python, see below), which eliminated the container-level
          # freezing that happened when pdftoppm was missing or choked on complex PDFs.
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip ffmpeg

      - name: Clone & Setup MangaTranslator Core
        run: |
          rm -rf MangaTranslator
          git clone https://github.com/meangrinch/MangaTranslator.git
          cd MangaTranslator
          # PyTorch must be installed explicitly - it is NOT in requirements.txt
          # because it's hardware-specific (CPU/CUDA/ROCm/MPS). Without this,
          # `import torch` inside main.py crashes immediately with
          # ModuleNotFoundError, which silently kills every translation job.
          pip install torch==2.11.0 torchvision==0.26.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          # Pillow: image stitching / PDF packaging
          # PyMuPDF: pure-Python PDF page extraction (replaces pdftoppm)
          # openai, pyrogram, tgcrypto: bot runtime deps
          pip install Pillow openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          # Fail fast in CI instead of discovering a broken environment only
          # when a real user job silently hangs mid-translation.
          python -c "import fitz; import PIL; import pyrogram; import tgcrypto; print('core imports OK')"

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
        run: python bot.py
