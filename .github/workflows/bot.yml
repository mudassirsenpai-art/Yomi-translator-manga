name: MangaTranslator Bot Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bot.py"
      - ".github/workflows/manga-bot.yml"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: manga-bot-service
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          # skia-python (used by MangaTranslator for text rendering) needs a full
          # graphics/EGL stack even on a headless runner - libgl1 alone is not enough.
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libgles2 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libglu1-mesa \
            libxi6 \
            libxrender1 \
            libxrandr2 \
            libxfixes3 \
            libxcursor1 \
            libxdamage1 \
            libxcomposite1 \
            libxkbcommon0 \
            unzip zip ffmpeg

      - name: Clone & Setup MangaTranslator Core
        run: |
          rm -rf MangaTranslator
          # Pinned to a tagged release instead of tracking main. v1.21.1 (2026-07-14)
          # swapped in a new RT-DETR-v2 conjoined-bubble detector model, which this
          # workflow hit mid-run as a fresh, untested weight download ("Loading
          # weights: 0/770" crash). Pinning avoids being silently broken by
          # same-day upstream changes; bump this tag deliberately when ready to
          # pick up new releases.
          git clone --branch v1.21.0 --depth 1 https://github.com/meangrinch/MangaTranslator.git
          cd MangaTranslator
          # PyTorch must be installed explicitly - it is NOT in requirements.txt
          # because it's hardware-specific (CPU/CUDA/ROCm/MPS).
          pip install torch==2.11.0 torchvision==0.26.0 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          # requirements.txt pulls in both opencv-python and opencv-contrib-python
          # (different sub-deps ask for each). Having both installed together is a
          # known source of native-level crashes/corruption in cv2, since they both
          # ship a `cv2` module and can clobber each other's shared libs. Keep only
          # contrib (superset of opencv-python) so there's a single consistent cv2.
          pip uninstall -y opencv-python opencv-python-headless opencv-contrib-python-headless
          pip install --force-reinstall --no-deps opencv-contrib-python
          # Pillow: image stitching / tiling / PDF packaging
          # numpy: row-flatness analysis for safe-cut Manhwa tiling
          # PyMuPDF: pure-Python PDF page extraction (replaces pdftoppm)
          # openai, pyrogram, tgcrypto: bot runtime deps
          pip install Pillow numpy openai pyrogram tgcrypto PyMuPDF

      - name: Verify Core Imports
        run: |
          python -c "import fitz; import PIL; import numpy; import pyrogram; import tgcrypto; print('core imports OK')"

      - name: Run Telegram Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          AUTHORIZED_USERS: ${{ secrets.AUTHORIZED_USERS }}
          # Needed for OSB (Outside Speech Bubble) model download from HF Hub.
          # Without this, the download is unauthenticated and can hit HF's
          # anonymous rate limit on GitHub's shared runner IPs, which is what
          # was surfacing as the earlier "unauthenticated requests" warning.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python bot.py
